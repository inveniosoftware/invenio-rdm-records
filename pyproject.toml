[project.entry-points."invenio_db.models"]
invenio_rdm_records = "invenio_rdm_records.records.models"

[project.entry-points."invenio_i18n.translations"]
invenio_rdm_records = "invenio_rdm_records"

[project.entry-points."invenio_jobs.jobs"]
update_expired_embargos = "invenio_rdm_records.jobs.jobs:update_expired_embargos_cls"

[project.entry-points."invenio_jsonschemas.schemas"]
invenio_rdm_records = "invenio_rdm_records.records.jsonschemas"

[project.entry-points."invenio_oauth2server.scopes"]
tokens_generate_scope = "invenio_rdm_records.tokens.scopes:tokens_generate_scope"

[project.entry-points."invenio_requests.entity_resolvers"]
email = "invenio_rdm_records.requests.entity_resolvers:EmailResolver"
records = "invenio_rdm_records.requests.entity_resolvers:RDMRecordResolver"

[project.entry-points."invenio_requests.types"]
community_inclusion = "invenio_rdm_records.requests.community_inclusion:get_request_type"
community_submission = "invenio_rdm_records.requests.community_submission:get_request_type"
file_modification = "invenio_rdm_records.requests.file_modification:get_request_type"
guest_access_request = "invenio_rdm_records.requests:GuestAccessRequest"
quota_increase = "invenio_rdm_records.requests.quota_increase:get_request_type"
record_deletion = "invenio_rdm_records.requests.record_deletion:get_request_type"
user_access_request = "invenio_rdm_records.requests:UserAccessRequest"

[project.entry-points."invenio_search.mappings"]
rdmrecords = "invenio_rdm_records.records.mappings"

[project.entry-points."invenio_users_resources.moderation.actions"]
approve = "invenio_rdm_records.requests.user_moderation.actions:on_approve"
block = "invenio_rdm_records.requests.user_moderation.actions:on_block"
restore = "invenio_rdm_records.requests.user_moderation.actions:on_restore"

[project.optional-dependencies]
elasticsearch7 = ["invenio-search[elasticsearch7]>=3.0.0,<4.0.0"]
opensearch1 = ["invenio-search[opensearch1]>=3.0.0,<4.0.0"]
opensearch2 = ["invenio-search[opensearch2]>=3.0.0,<4.0.0"]
tests = [
  "invenio-app>=3.0.0,<4.0.0",
  "invenio-db[postgresql,mysql]>=2.2.0,<3.0.0",
  "invenio-github>=7.0.0,<8.0.0",
  "invenio-vcs>=0.4.0,<1.0.0",
  "psutil>=7.0.0",
  "pytest-black>=0.6.0",
  "pytest-invenio>=4.0.0,<5.0.0",
  "pytest-mock>=1.6.0",
  "sphinx>=4.5.0",
  "tripoli>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# see https://babel.pocoo.org/en/latest/messages.html#toml-configuration-format
[tool.babel]
[tool.babel.compile_catalog]
directory = "invenio_rdm_records/translations/"
use_fuzzy = true

[tool.babel.extract_messages]
copyright_holder = "CERN"
msgid_bugs_address = "info@inveniosoftware.org"
mapping_file = "pyproject.toml"
output_file = "invenio_rdm_records/translations/messages.pot"
add_comments = "NOTE"

[tool.babel.init_catalog]
input_file = "invenio_rdm_records/translations/messages.pot"
output_dir = "invenio_rdm_records/translations/"

[[tool.babel.mappings]]
method = "javascript"
pattern = "**.js"
encoding = "utf-8"
extract_messages = "$._, jQuery._"

[[tool.babel.mappings]]
method = "python"
pattern = "**.py"
encoding = "utf-8"

[[tool.babel.mappings]]
method = "jinja2"
pattern = "**/templates/**.html"
encoding = "utf-8"

[tool.hatch.version]
path = "invenio_rdm_records/__init__.py"

[tool.hatch.build.targets.sdist]
include = ["/invenio_rdm_records"]

[tool.isort]
profile = "black"

[tool.pydocstyle]
add_ignore = "D401,D403"

[tool.pytest.ini_options]
addopts = '--black --isort --pydocstyle --doctest-glob="*.rst" --doctest-modules --cov=invenio_rdm_records --cov-report=term-missing'
filterwarnings = ["ignore::marshmallow.warnings.RemovedInMarshmallow4Warning"]
testpaths = "tests invenio_rdm_records"
live_server_scope = "module"

# UV needs to be told explicitly which extras are conflicting:
# https://docs.astral.sh/uv/concepts/projects/config/#conflicting-dependencies
[tool.uv]
conflicts = [
  [
    { extra = "opensearch1" },
    { extra = "opensearch2" },
    { extra = "elasticsearch7" },
  ],
]
