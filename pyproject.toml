[project]
name = "invenio-rdm-records"
description = "InvenioRDM module for the communities feature."
readme = "README.rst"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "CERN", email = "info@inveniosoftware.org" }]
keywords = ["data", "invenio", "model", "rdm"]
classifiers = ["Development Status :: 5 - Production/Stable"]
dependencies = [
  "arrow>=0.17.0",
  "babel-edtf>=1.2.0",
  "citeproc-py>=0.6.0",
  "citeproc-py-styles>=0.1.2,<1.0.0",
  "commonmeta-py>=0.268,<1.0.0",
  "datacite>=1.1.1,<2.0.0",
  "dcxml>=0.1.2,<1.0.0",
  "faker>=2.0.3",
  "flask-iiif>=2.0.0,<3.0.0",
  "invenio-administration>=7.0.0,<8.0.0",
  "invenio-audit-logs>=4.0.0,<5.0.0",
  "invenio-base>=2.3.0,<3.0.0",
  "invenio-checks>=11.0.0,<12.0.0",
  "invenio-collections>=10.0.0,<11.0.0",
  "invenio-communities>=29.0.0,<30.0.0",
  "invenio-drafts-resources>=11.0.0,<12.0.0",
  "invenio-i18n>=4.0.0,<5.0.0",
  "invenio-jobs>=11.0.0,<12.0.0",
  "invenio-oaiserver>=6.0.0,<7.0.0",
  "invenio-oauth2server>=6.0.0,<7.0.0",
  "invenio-records-resources>=11.0.0,<12.0.0",
  "invenio-stats>=7.0.0,<8.0.0",
  "invenio-vocabularies>=14.0.0,<15.0.0",
  "nameparser>=1.1.1",
  "pycountry>=22.3.5",
  "pydash>=6.0.0,<7.0.0",
  "python-slugify>=8.0.1",
  "pytz>=2020.4",
  "pyyaml>=5.4.0",
]
dynamic = ["version"]

[project.urls]
Repository = "https://github.com/inveniosoftware/invenio-rdm-records"

[project.entry-points."flask.commands"]
rdm-records = "invenio_rdm_records.cli:rdm_records"

[project.entry-points."invenio_administration.views"]
